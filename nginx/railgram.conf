server {
    listen 80 default_server;
    server_name _;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /home/ubuntu/RailGram/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name railgram.in www.railgram.in;
    return 301 https://railgram.in$request_uri;
}

server {
    listen 443 ssl;
    server_name www.railgram.in;
    ssl_certificate /etc/letsencrypt/live/railgram.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/railgram.in/privkey.pem;
    return 301 https://railgram.in$request_uri;
}

server {
    listen 443 ssl;
    server_name railgram.in;

    ssl_certificate /etc/letsencrypt/live/railgram.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/railgram.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html — no cache (always fresh)
    location = /index.html {
        root /home/ubuntu/RailGram/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # JS/CSS assets — cache 1 year (filenames have hash, change on rebuild)
    location /assets/ {
        root /home/ubuntu/RailGram/frontend/dist;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root /home/ubuntu/RailGram/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
